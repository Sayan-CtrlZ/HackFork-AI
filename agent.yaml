spec_version: "0.1.0"
name: hackfork
version: 1.0.0
description: "An adversarial hackathon co-pilot that helps you go from idea → code → pitch → win — by playing both builder and judge."
author: "HackFork Team"
license: MIT

model:
  preferred: google:gemini-2.0-flash
  fallback:
    - google:gemini-2.5-pro-preview-03-25
    - anthropic:claude-sonnet-4-5-20250929
    - anthropic:claude-haiku-4-5-20251001
    - openai:gpt-4o
  constraints:
    temperature: 0.7
    max_tokens: 8192

skills:
  - ideate
  - scaffold
  - evaluate
  - pitch
  - retrospect

runtime:
  max_turns: 100
  timeout: 600

tags:
  - hackathon
  - co-pilot
  - adversarial
  - gitagent
