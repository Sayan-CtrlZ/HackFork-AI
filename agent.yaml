spec_version: "0.1.0"
name: hackfork
version: 1.0.0
description: "An adversarial hackathon co-pilot that helps you go from idea → code → pitch → win — by playing both builder and judge."
author: "HackFork Team"
license: MIT

model:
  preferred: claude-sonnet-4-5-20250929
  fallback:
    - claude-haiku-4-5-20251001
    - gpt-4o
  constraints:
    temperature: 0.7
    max_tokens: 8192

skills:
  - ideate
  - scaffold
  - evaluate
  - pitch
  - retrospect

runtime:
  max_turns: 100
  timeout: 600

tags:
  - hackathon
  - co-pilot
  - adversarial
  - productivity
  - builder

metadata:
  homepage: "https://github.com/hackfork/hackfork"
  phase_aware: "true"
  dual_persona: "true"
  demo_ready: "true"
