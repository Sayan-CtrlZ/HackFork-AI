name: on_validate
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  validate-agent:
    runs-on: ubuntu-latest
    name: Validate HackFork Agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate agent structure
        run: npx --yes gitagent validate

      - name: Print agent info
        run: npx --yes gitagent info
