name: on_validate
on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  validate-agent:
    runs-on: ubuntu-latest
    name: Validate HackFork Agent
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install gitagent CLI
        run: npm install -g gitclaw

      - name: Validate agent structure
        run: gitagent validate
        working-directory: .

      - name: Print agent info
        run: gitagent info
        working-directory: .
